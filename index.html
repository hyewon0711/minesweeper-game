<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지뢰찾기 (Minesweeper)</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 로그인 / 회원가입 화면 -->
    <div id="auth-screen" class="auth-screen">
        <div class="auth-container">
            <h1 class="auth-title">지뢰찾기</h1>
            <div class="auth-tabs">
                <button id="tab-login" class="auth-tab active" type="button">로그인</button>
                <button id="tab-register" class="auth-tab" type="button">회원가입</button>
            </div>
            <form id="auth-form" class="auth-form" autocomplete="off">
                <input id="auth-username" type="text" placeholder="아이디" required maxlength="20" autocomplete="username">
                <input id="auth-password" type="password" placeholder="비밀번호 (4자 이상)" required maxlength="50" autocomplete="current-password">
                <p id="auth-message" class="auth-message"></p>
                <button type="submit" id="auth-submit" class="auth-submit">로그인</button>
            </form>
            <p class="auth-note">계정과 진행상황은 이 브라우저에만 저장됩니다.</p>
        </div>
    </div>

    <!-- 로비: 스테이지 선택 -->
    <div id="lobby-screen" class="game-container lobby-screen hidden">
        <div class="user-bar">
            <span class="user-info">👤 <span id="lobby-user-name"></span></span>
            <button id="lobby-logout-btn" class="logout-btn" type="button">로그아웃</button>
        </div>
        <div class="volume-bar">
            <button id="lobby-volume-icon" class="volume-icon" type="button" aria-label="음소거 토글">🔊</button>
            <input id="lobby-volume-slider" class="volume-slider" type="range" min="0" max="100" step="1" value="20" aria-label="볼륨">
            <span id="lobby-volume-value" class="volume-value">20</span>
        </div>
        <h1 class="lobby-title">지뢰찾기</h1>
        <div class="lobby-body">
            <div class="lobby-scene-nav">
                <button id="lobby-prev-btn" class="scene-nav-btn scene-nav-prev hidden" type="button" aria-label="이전 공간">◀</button>
                <div id="lobby-scene" class="lobby-scene"></div>
                <button id="lobby-next-btn" class="scene-nav-btn scene-nav-next hidden" type="button" aria-label="다음 공간">▶</button>
            </div>
            <div class="lobby-scene-info">
                <div class="world-name" id="lobby-world-name">공간 ① 아늑한 서재</div>
                <div class="world-progress" id="lobby-world-progress">0 / 10</div>
            </div>
        </div>
        <div class="stage-select">
            <button id="stage-btn" class="stage-btn" type="button">스테이지 1</button>
        </div>
    </div>

    <div id="game-container" class="game-container hidden">
        <div class="user-bar">
            <span class="user-info">👤 <span id="user-name"></span></span>
            <div class="user-bar-actions">
                <button id="game-quit-btn" class="logout-btn" type="button">나가기</button>
                <button id="logout-btn" class="logout-btn" type="button">로그아웃</button>
            </div>
        </div>
        <div class="volume-bar">
            <button id="game-volume-icon" class="volume-icon" type="button" aria-label="음소거 토글">🔊</button>
            <input id="game-volume-slider" class="volume-slider" type="range" min="0" max="100" step="1" value="20" aria-label="볼륨">
            <span id="game-volume-value" class="volume-value">20</span>
        </div>
        <h1 id="game-title">지뢰찾기 - 스테이지 1</h1>
        <div class="header">
            <div class="status-box">지뢰: <span id="mine-count">3</span></div>
            <button id="reset-btn" class="reset-btn">😊</button>
            <div class="status-box hint-box" title="오른쪽 클릭으로 깃발 꽂기">
                <svg class="hint-mouse" viewBox="0 0 22 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <!-- 마우스 외곽선 -->
                    <path d="M 11 1 C 16 1 20 5 20 10 L 20 20 C 20 24 16 27 11 27 C 6 27 2 24 2 20 L 2 10 C 2 5 6 1 11 1 Z"
                          fill="white" stroke="#1A2D3E" stroke-width="1.4"/>
                    <!-- 오른쪽 버튼 강조 (세이지 틸) -->
                    <path d="M 11 1.7 C 15.5 1.7 19.3 5.3 19.3 10 L 19.3 11.7 L 11 11.7 Z" fill="#5D9188"/>
                    <!-- 버튼 분할선 -->
                    <line x1="11" y1="1.5" x2="11" y2="11.7" stroke="#1A2D3E" stroke-width="1.1"/>
                    <line x1="2.7" y1="11.7" x2="19.3" y2="11.7" stroke="#1A2D3E" stroke-width="1.1"/>
                </svg>
                <span class="hint-arrow">→</span>
                <span class="hint-flag">🚩</span>
            </div>
        </div>
        <div id="board" class="board"></div>
    </div>
    <!-- 게임 오버 팝업창 -->
    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h2>게임 오버! 💥</h2>
            <p>지뢰를 밟았습니다.</p>
            <div class="modal-buttons">
                <button id="retry-btn">재시도</button>
                <button id="exit-btn">나가기</button>
            </div>
        </div>
    </div>

    <!-- 나가기 확인 팝업창 -->
    <div id="quit-confirm-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="quit-title">정말 나가시겠어요?</h2>
            <p>지금까지 진행한 판이 사라집니다.</p>
            <div class="modal-buttons">
                <button id="quit-yes-btn">예</button>
                <button id="quit-no-btn">아니오</button>
            </div>
        </div>
    </div>

    <!-- 게임 클리어 팝업창 -->
    <div id="game-clear-modal" class="modal hidden">
        <div class="modal-content">
            <h2>스테이지 클리어! 🎉</h2>
            <p>모든 지뢰를 찾았습니다!</p>
            <div class="modal-buttons">
                <button id="next-stage-btn">다음 스테이지</button>
                <button id="clear-exit-btn">나가기</button>
            </div>
        </div>
    </div>

    <!-- 엔딩 팝업창 -->
    <div id="game-ending-modal" class="modal hidden">
        <div class="modal-content">
            <h2>플레이 해주셔서 감사합니다! 🎉</h2>
            <p>정식 게임 발매를 기다려주세요!</p>
            <p class="ending-reward-note">
                <strong><span id="ending-username">닉네임</span></strong> 님, <strong>김혜원</strong>에게 해당 화면을 캡쳐해서 DM을 보내세요.<br>
                소정의 상품을 드립니다. 🎁
            </p>
            <div class="modal-buttons">
                <button id="ending-exit-btn">확인</button>
            </div>
        </div>
    </div>
